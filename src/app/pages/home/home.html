<div class="content-wrapper">
  <div class="content">
    <header class="home-header">
      <img src="/assets/images/logo.svg" alt="Logo" class="logo" />
    </header>

    <main class="home-main">
      <!-- OBERER CONTAINER -->
      <div class="top-container">
        <!-- LINKE SEITE -->
        <div class="left">
          <h1>
            Collect Feedback,<br />
            Unlock Ideas
          </h1>

          <p>
            Create and share surveys in minutes – from team events to workplace culture. Collect
            opinions, engage your audience, and turn feedback into action.
          </p>

          <button class="primary-btn" [routerLink]="['/create']">
            <span>New survey</span>
            <img src="/assets/icons/plus.svg" alt="Plus Icon" class="plus-icon" />
          </button>
        </div>

        <!-- RECHTE SEITE -->
        <div class="phone-wrapper">
          <img src="/assets/images/phone-mockup.svg" alt="Phone" class="default" />
          <img src="/assets/images/phone-mockup-hover.svg" alt="Phone Hover" class="hover" />
        </div>
      </div>

      <!-- UNTERER CONTAINER -->
      <div class="bottom-container">
        <h2>Your surveys</h2>
        <p class="subtitle">Ending soon surveys</p>

        <div class="cards">
          <div class="card" *ngFor="let s of surveys" [routerLink]="['/single', s.id]">
            <span class="category">{{ s.category }}</span>
            <h3 class="title">{{ s.name }}</h3>
            <button class="ends">Ends in {{ s.endsIn }}</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
